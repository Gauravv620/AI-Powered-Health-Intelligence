<!DOCTYPE html>
<html>
<head>
  <title>HealthAI Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- NAVBAR -->
<header class="nav">
  <div class="logo">HealthAI</div>
  <div class="actions">
    <button onclick="toggleTheme()">🌙</button>
    <a href="/logout">Logout</a>
  </div>
</header>

<main class="grid">

  <!-- UPLOAD -->
  <section class="card">
    <h3>Upload Medical Report</h3>
    <input type="file" id="file">
    <button onclick="uploadFile()">Upload</button>
  </section>

  <!-- INPUT -->
  <section class="card">
    <h3>Health Inputs</h3>

    <div class="row">
      <input id="pregnancies" placeholder="Pregnancies">
      <input id="glucose" placeholder="Glucose">
    </div>

    <div class="row">
      <input id="blood_pressure" placeholder="Blood Pressure">
      <input id="bmi" placeholder="BMI">
    </div>

    <input id="age" placeholder="Age">

    <button class="primary" onclick="predict()">Analyze</button>
  </section>

  <!-- RESULT -->
  <section class="card result">
    <h3>Prediction</h3>
    <div id="riskBadge" class="badge">—</div>
    <div id="scoreText">Score: —</div>
  </section>

  <!-- HEALTH SCORE -->
  <section class="card">
    <h3>Health Score</h3>
    <div class="ring">
      <span id="scoreVal">0%</span>
    </div>
  </section>

  <!-- CHARTS -->
  <section class="card">
    <h3>Metrics</h3>
    <canvas id="barChart"></canvas>
  </section>

  <section class="card">
    <h3>Risk Gauge</h3>
    <canvas id="gaugeChart"></canvas>
  </section>

  <section class="card">
    <h3>Health Trends</h3>
    <canvas id="trendChart"></canvas>
  </section>

  <!-- ECG -->
  <section class="card">
    <h3>Live Heart Activity</h3>
    <canvas id="ecgChart"></canvas>
  </section>

  <!-- SUMMARY -->
  <section class="card">
    <h3>Summary</h3>
    <div id="summaryBox"></div>
  </section>

  <!-- RECOMMENDATION -->
  <section class="card">
    <h3>Recommendations</h3>
    <div id="recBox"></div>
  </section>

  <!-- AI DOCTOR -->
  <section class="card">
    <h3>AI Doctor Explanation</h3>
    <button onclick="getExplanation()">Generate Report</button>
    <div id="aiReport"></div>
  </section>

  <!-- CHATBOT -->
  <section class="card">
    <h3>AI Health Assistant</h3>

    <div id="chatBox" class="chat-box"></div>

    <input id="chatInput" placeholder="Ask about your health...">
    <button onclick="sendMessage()">Send</button>

    <button onclick="startVoice()">🎤 Speak</button>
    <div id="voiceText"></div>
  </section>

  <!-- ACTION -->
  <section class="card">
    <h3>Actions</h3>
    <button onclick="downloadReport()">Download Report</button>
  </section>

</main>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
